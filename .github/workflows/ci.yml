name: CI

on:
    pull_request:
    push:
        branches: [main]

jobs:
    scan_ruby:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Set up Ruby
              uses: ruby/setup-ruby@v1
              with:
                  bundler-cache: true

            - name: Scan for common Rails security vulnerabilities using static analysis
              run: bin/brakeman --no-pager

            - name: Scan for known security vulnerabilities in gems used
              run: bin/bundler-audit

    scan_js:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Set up Ruby
              uses: ruby/setup-ruby@v1
              with:
                  bundler-cache: true

            - name: Scan for security vulnerabilities in JavaScript dependencies
              run: bin/importmap audit

    lint:
        runs-on: ubuntu-latest
        env:
            RUBOCOP_CACHE_ROOT: tmp/rubocop
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Set up Ruby
              uses: ruby/setup-ruby@v1
              with:
                  bundler-cache: true

            - name: Prepare RuboCop cache
              uses: actions/cache@v5
              env:
                  DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
              with:
                  path: ${{ env.RUBOCOP_CACHE_ROOT }}
                  key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
                  restore-keys: |
                      rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

            - name: Lint code for consistent style
              run: bin/rubocop -f github

    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Set up Ruby
              uses: ruby/setup-ruby@v1
              with:
                  bundler-cache: true

            # Same as the Dockerfile (which runs assets:precompile → tailwindcss:build):
            # the compiled stylesheet is a gitignored build artifact, so build it before
            # any view-rendering test resolves it via stylesheet_link_tag.
            - name: Build Tailwind CSS
              run: bin/rails tailwindcss:build

            - name: Run tests
              env:
                  RAILS_ENV: test
              run: |
                  bin/rails db:test:prepare
                  bin/rails test

    # Build the Docker image and push it to GitHub Container Registry.
    # Only on pushes to main, and only after the scans, lint, and tests pass.
    publish:
        runs-on: ubuntu-latest
        needs: [scan_ruby, scan_js, lint, test]
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker metadata (tags + labels)
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ghcr.io/${{ github.repository }}
                  tags: |
                      type=ref,event=branch
                      type=sha
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Build and push image
              uses: docker/build-push-action@v7
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Prune old package versions
              uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5.0.0
              with:
                  package-name: "malady"
                  package-type: "container"
                  min-versions-to-keep: 10
