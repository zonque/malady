# Dependabot version updates. See all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # NOTE: Bundler version updates are intentionally NOT handled here. Dependabot
  # bumps listed gems individually and doesn't refresh transitive dependencies,
  # so it isn't equivalent to `bundle update --all`. The "Bundle update" workflow
  # (.github/workflows/bundle-update.yml) does that instead. Dependabot *security*
  # updates for gems still apply (they don't require a config entry), and CI runs
  # bundler-audit.

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        update-types: ["minor", "patch"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker"
